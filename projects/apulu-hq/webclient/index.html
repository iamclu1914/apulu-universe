<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Apulu HQ — v0 test client</title>
<style>
  :root {
    --bg: #1a1410;
    --surface: #2a1f18;
    --surface-2: #382a20;
    --gold: #c8a35b;
    --text: #f4ecdf;
    --muted: #9a8a78;
    --error: #d96565;
    --ok: #8bc28b;
    --warn: #e2b463;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Raleway", system-ui, sans-serif;
    height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    grid-template-rows: 56px auto 1fr;
  }
  h1, h2 { font-family: "Instrument Serif", Georgia, serif; font-weight: 400; margin: 0; }
  header { grid-column: 1 / -1; padding: 12px 20px; border-bottom: 1px solid var(--surface-2); display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
  header .pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; background: var(--surface-2); color: var(--muted); }
  header .pill.ok { color: var(--ok); }
  header .pill.warn { color: var(--warn); }
  header .pill.error { color: var(--error); }

  #banner { grid-column: 1 / -1; padding: 0; height: 0; overflow: hidden; transition: height 0.2s; background: var(--error); color: #1a1410; font-weight: 600; display: flex; align-items: center; padding-left: 20px; }
  #banner.show { height: 36px; padding-top: 0; padding-bottom: 0; }

  aside.agents { background: var(--surface); border-right: 1px solid var(--surface-2); overflow-y: auto; }
  main.chat { display: flex; flex-direction: column; min-height: 0; }
  aside.events { background: var(--surface); border-left: 1px solid var(--surface-2); display: flex; flex-direction: column; min-height: 0; }
  .section-title { color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; padding: 14px 16px 6px; }
  .agent {
    padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--surface-2);
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s, border-left 0.15s;
  }
  .agent:hover { background: var(--surface-2); }
  .agent.active { background: var(--surface-2); border-left: 3px solid var(--gold); padding-left: 13px; }
  .agent.flash-success { background: rgba(139, 194, 139, 0.15); }
  .agent.flash-fail { background: rgba(217, 101, 101, 0.18); }
  .agent .name { font-weight: 600; }
  .agent .role { font-size: 11px; color: var(--muted); }
  .agent .dept { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; }
  .agent .info { flex: 1; }
  .agent .status {
    font-size: 18px; line-height: 1;
  }

  .chat-header { padding: 14px 20px; border-bottom: 1px solid var(--surface-2); }
  .chat-header h2 { font-size: 22px; color: var(--gold); }
  .chat-header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; font-size: 14px; }
  .msg.user { align-self: flex-end; background: var(--gold); color: #1a1410; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--surface-2); }
  .composer { padding: 14px 20px; border-top: 1px solid var(--surface-2); display: flex; gap: 8px; }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 200px;
    background: var(--surface); color: var(--text); border: 1px solid var(--surface-2);
    border-radius: 8px; padding: 10px 12px; font-family: inherit; font-size: 14px;
  }
  .composer button {
    background: var(--gold); color: #1a1410; border: 0; border-radius: 8px;
    padding: 0 18px; font-weight: 600; cursor: pointer;
  }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .panel-tabs { display: flex; border-bottom: 1px solid var(--surface-2); }
  .panel-tabs button {
    flex: 1; background: transparent; border: 0; padding: 10px; color: var(--muted);
    cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    border-bottom: 2px solid transparent;
  }
  .panel-tabs button.active { color: var(--gold); border-bottom-color: var(--gold); }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: "JetBrains Mono", monospace; font-size: 11px; }
  .event, .dispatch { padding: 6px 0; color: var(--muted); border-bottom: 1px dashed var(--surface-2); }
  .event .type, .dispatch .name { color: var(--gold); }
  .event.ok .type { color: var(--ok); }
  .event.fail .type { color: var(--error); }
  .dispatch.fail .name { color: var(--error); }
  .dispatch.success .name { color: var(--ok); }
  .dispatch .meta { color: var(--muted); font-size: 10px; }
  .empty { padding: 30px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1 style="color: var(--gold); font-size: 24px;">Apulu HQ <span style="color: var(--muted); font-size: 12px;">v0 — observe-only</span></h1>
  <div style="display: flex; gap: 8px; align-items: center;">
    <span class="pill" id="health">connecting…</span>
    <span class="pill" id="backend">backend ⚫</span>
    <span class="pill" id="ws">ws ⚫</span>
  </div>
</header>

<div id="banner"></div>

<aside class="agents">
  <div class="section-title">Agents</div>
  <div id="agents"></div>
</aside>

<main class="chat">
  <div class="chat-header" id="chat-header">
    <h2>Select an agent</h2>
    <div class="sub">Click any agent on the left to start a conversation.</div>
  </div>
  <div class="messages" id="messages">
    <div class="empty">No conversation yet.</div>
  </div>
  <div class="composer">
    <textarea id="input" placeholder="Message will be sent to the selected agent…" disabled></textarea>
    <button id="send" disabled>Send</button>
  </div>
</main>

<aside class="events">
  <div class="panel-tabs">
    <button data-tab="events" class="active">Events</button>
    <button data-tab="dispatches">Dispatches</button>
    <button data-tab="dlq">DLQ</button>
  </div>
  <div class="panel-body" id="events-panel"></div>
  <div class="panel-body" id="dispatches-panel" hidden></div>
  <div class="panel-body" id="dlq-panel" hidden></div>
</aside>

<script>
const API = location.origin;
const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

const state = {
  agents: [],
  agentById: {},
  activeAgent: null,
  threadId: null,
  ws: null,
};

async function loadHealth() {
  try {
    const r = await fetch(API + "/api/health");
    const j = await r.json();
    document.getElementById("health").textContent =
      `${j.agents} agents · ${j.routines} routines · ${j.anthropic_key_set ? "key ✓" : "mock mode"}`;
    document.getElementById("health").classList.add("ok");
  } catch (e) {
    document.getElementById("health").textContent = "backend down";
  }
}

async function loadAgents() {
  const r = await fetch(API + "/api/agents");
  state.agents = await r.json();
  state.agentById = Object.fromEntries(state.agents.map(a => [a.id, a]));
  const root = document.getElementById("agents");
  root.innerHTML = "";
  const byDept = {};
  state.agents.forEach(a => { (byDept[a.department] = byDept[a.department] || []).push(a); });
  const order = ["board", "cos", "marketing", "operations", "research", "production", "post-prod"];
  order.forEach(dept => {
    if (!byDept[dept]) return;
    const head = document.createElement("div");
    head.className = "section-title";
    head.textContent = dept;
    root.appendChild(head);
    byDept[dept].forEach(a => {
      const el = document.createElement("div");
      el.className = "agent";
      el.dataset.id = a.id;
      el.innerHTML = `<div class="info"><div class="dept">${a.adapter_type}</div><div class="name">${a.display_name}</div><div class="role">${a.role}</div></div><div class="status" data-id="${a.id}">💼</div>`;
      el.onclick = () => selectAgent(a);
      root.appendChild(el);
    });
  });
}

async function loadDispatches() {
  const r = await fetch(API + "/api/dispatches?limit=50");
  const rows = await r.json();
  const panel = document.getElementById("dispatches-panel");
  if (!rows.length) {
    panel.innerHTML = `<div class="empty">No dispatches yet. Run a routine in Paperclip — events will land here.</div>`;
    return;
  }
  panel.innerHTML = "";
  rows.forEach(d => {
    const cls = d.outcome === "success" ? "success" : d.outcome === "failure" ? "fail" : "";
    const ts = d.started_at?.replace("T", " ").slice(0, 19) || "";
    const dur = d.duration_ms ? ` · ${(d.duration_ms/1000).toFixed(1)}s` : "";
    const sig = d.signature ? ` · sig=${d.signature}` : "";
    const el = document.createElement("div");
    el.className = "dispatch " + cls;
    el.innerHTML = `<div class="name">${d.routine_name || d.routine_id}</div><div class="meta">${ts} · ${d.agent_name || ""} · attempt ${d.attempt}${dur}${sig}</div>`;
    panel.appendChild(el);
  });
}

async function loadDlq() {
  const r = await fetch(API + "/api/dlq");
  const rows = await r.json();
  const panel = document.getElementById("dlq-panel");
  if (!rows.length) {
    panel.innerHTML = `<div class="empty">DLQ empty 🎉</div>`;
    return;
  }
  panel.innerHTML = "";
  rows.forEach(d => {
    const ts = d.appended_at?.replace("T", " ").slice(0, 19) || "";
    const el = document.createElement("div");
    el.className = "dispatch fail";
    el.innerHTML = `<div class="name">${d.payload?.slot || d.routine_id}</div><div class="meta">${ts} · ${d.signature || "no sig"} · ${d.payload?.final_exit_code ?? ""}</div>`;
    panel.appendChild(el);
  });
}

async function selectAgent(agent) {
  state.activeAgent = agent;
  state.threadId = null;
  document.querySelectorAll(".agent").forEach(el => el.classList.toggle("active", el.dataset.id === agent.id));
  document.getElementById("chat-header").innerHTML =
    `<h2>${agent.display_name}</h2><div class="sub">${agent.role} · ${agent.adapter_type}</div>`;
  document.getElementById("messages").innerHTML = `<div class="empty">Start a new conversation with ${agent.display_name}.</div>`;
  document.getElementById("input").disabled = false;
  document.getElementById("send").disabled = false;
  document.getElementById("input").focus();
}

function appendMessage(role, text, replaceLast = false) {
  const root = document.getElementById("messages");
  if (root.querySelector(".empty")) root.innerHTML = "";
  let el;
  if (replaceLast && root.lastChild?.classList.contains(role) && root.lastChild.dataset.streaming === "1") {
    el = root.lastChild;
  } else {
    el = document.createElement("div");
    el.className = "msg " + role;
    el.dataset.streaming = role === "assistant" ? "1" : "0";
    root.appendChild(el);
  }
  el.textContent += text;
  root.scrollTop = root.scrollHeight;
  return el;
}

async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg || !state.activeAgent) return;
  appendMessage("user", msg);
  input.value = "";
  await fetch(`${API}/api/agents/${state.activeAgent.id}/chat`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg, thread_id: state.threadId }),
  });
}

function flashAgent(agentId, kind) {
  if (!agentId) return;
  const el = document.querySelector(`.agent[data-id="${agentId}"]`);
  if (!el) return;
  el.classList.add(kind === "success" ? "flash-success" : "flash-fail");
  const statusEl = document.querySelector(`.status[data-id="${agentId}"]`);
  if (statusEl) statusEl.textContent = kind === "success" ? "✅" : "⚠️";
  setTimeout(() => {
    el.classList.remove("flash-success", "flash-fail");
    if (statusEl) statusEl.textContent = "💼";
  }, 4000);
}

function connectWs() {
  state.ws = new WebSocket(WS_URL);
  state.ws.onopen = () => {
    document.getElementById("ws").textContent = "ws 🟢";
    document.getElementById("ws").classList.add("ok");
  };
  state.ws.onclose = () => {
    document.getElementById("ws").textContent = "ws 🔴";
    document.getElementById("ws").classList.remove("ok");
    setTimeout(connectWs, 1500);
  };
  state.ws.onmessage = (ev) => {
    const e = JSON.parse(ev.data);
    handleEvent(e);
  };
}

function handleEvent(e) {
  logEvent(e);
  if (e.type === "chat.token" && e.payload.agent_id === state.activeAgent?.id) {
    if (!state.threadId) state.threadId = e.payload.thread_id;
    appendMessage("assistant", e.payload.token, true);
  } else if (e.type === "chat.done" && e.payload.agent_id === state.activeAgent?.id) {
    const root = document.getElementById("messages");
    if (root.lastChild) root.lastChild.dataset.streaming = "0";
  } else if (e.type === "routine.succeeded") {
    flashAgent(e.payload.agent_id, "success");
    loadDispatches();
  } else if (e.type === "routine.failed") {
    flashAgent(e.payload.agent_id, "fail");
    loadDispatches();
  } else if (e.type === "dlq.appended") {
    flashAgent(e.payload.agent_id, "fail");
    loadDlq();
  } else if (e.type === "breaker.tripped") {
    const b = document.getElementById("banner");
    b.textContent = `⚠️ Backend breaker tripped: ${e.payload.component} (${e.payload.reason})`;
    b.classList.add("show");
    document.getElementById("backend").textContent = "backend 🔴";
    document.getElementById("backend").classList.add("error");
  } else if (e.type === "breaker.cleared") {
    document.getElementById("banner").classList.remove("show");
    document.getElementById("backend").textContent = "backend 🟢";
    document.getElementById("backend").classList.remove("error");
  } else if (e.type === "health.snapshot") {
    const overall = e.payload.overall;
    const pill = document.getElementById("backend");
    pill.textContent = `backend ${overall}`;
    pill.classList.toggle("ok", overall === "healthy");
    pill.classList.toggle("error", overall !== "healthy" && overall !== "unknown");
  }
}

function logEvent(e) {
  const root = document.getElementById("events-panel");
  if (root.querySelector(".empty")) root.innerHTML = "";
  const el = document.createElement("div");
  const cls = e.type.includes("succeeded") || e.type === "breaker.cleared" ? "ok"
            : e.type.includes("failed") || e.type === "breaker.tripped" || e.type === "dlq.appended" ? "fail"
            : "";
  el.className = "event " + cls;
  const ts = e.ts.split("T")[1]?.slice(0, 12) || "";
  el.innerHTML = `<span class="type">${e.type}</span> <span style="opacity:.6">${ts}</span><br/>${
    JSON.stringify(e.payload).slice(0, 180)
  }`;
  root.prepend(el);
  while (root.children.length > 200) root.lastChild.remove();
}

// tab switching
document.querySelectorAll(".panel-tabs button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".panel-tabs button").forEach(b => b.classList.toggle("active", b === btn));
    document.getElementById("events-panel").hidden = btn.dataset.tab !== "events";
    document.getElementById("dispatches-panel").hidden = btn.dataset.tab !== "dispatches";
    document.getElementById("dlq-panel").hidden = btn.dataset.tab !== "dlq";
    if (btn.dataset.tab === "dispatches") loadDispatches();
    if (btn.dataset.tab === "dlq") loadDlq();
  };
});

document.getElementById("send").onclick = send;
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

loadHealth();
loadAgents().then(() => loadDispatches());
connectWs();
setInterval(loadHealth, 30000);
setInterval(loadDispatches, 60000);
</script>
</body>
</html>
